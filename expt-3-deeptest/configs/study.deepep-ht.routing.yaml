# expt-3-deeptest: DeepEP High Throughput — Routing Sweep (Study D)
#
# Extends study.deepep-ht.qwen3.yaml with a 4-mode routing sweep to measure how
# expert load imbalance affects the collective-based NCCL dispatch mechanism.
#
# Research question:
#   How does routing skew interact with HT collective dispatch? Unlike LL's
#   per-expert NVSHMEM queues, HT uses all-to-all NCCL collectives that are
#   symmetric by construction — but skew still means more data to hot GPUs,
#   increasing the effective allgather/reduce-scatter volume asymmetrically.
#
# Routing modes:
#   uniform    : equal probability across all 128 experts (baseline)
#   zipfian    : power-law; expert 0 gets ~40% of traffic (realistic inference skew)
#   skewed-2x  : hot expert 2× expected share (alpha=2.0, mild imbalance)
#   skewed-4x  : hot expert 4× expected share (alpha=4.0, heavy imbalance)
#
# Token range: full 14-value sweep [1..65536] — HT is designed for large batches.
# Transport: nvlink_default only — isolates routing effect without bandwidth confound.
# Use study.deepep-ht.routing.transport.yaml to add bandwidth congestion.
#
# SLURM jobs: 4 parallel points × 1 transport = 4
# Conditions per job: 4 routing_modes × 14 tokens = 56
# Grand total: 224 benchmark conditions

study_name: deepep-ht-routing-qwen3
all2all_backend: deepep_high_throughput
output_root: ~/scratch/moe-breakdown-runs/expt-3-deeptest

hot_expert_count: 1
routing_weight_mode: uniform
apply_router_weight_on_input: false
seed: 42
warmup_iters: 30
measure_iters: 100
collect_buckets: true
bucket_profile_iters: 5
bucket_full_events: true

sweep_modes:
  - full_factorial

baseline:
  alpha: 1.0
  tokens: 512
  parallel:
    tp: 1
    ep: 1

kernel_shapes:
  - name: qwen3_30b_a3b_moe
    hidden_size: 2048
    intermediate_size: 768
    num_experts: 128
    topk: 8
    dtype: bfloat16

routing_modes:
  - uniform
  - zipfian
  - skewed-2x
  - skewed-4x

tokens: [1, 2, 4, 8, 16, 32, 64, 128, 512, 2048, 8192, 16384, 32768, 65536]

parallel_points:
  - {tp: 1, ep: 1}   # control: no inter-GPU dispatch
  - {tp: 1, ep: 2}   # onset of expert dispatch
  - {tp: 1, ep: 4}   # maximum EP on 4-GPU node
  - {tp: 2, ep: 2}   # TP+EP combined (not supported in LL; use HT for this point)

transport_conditions:
  - nvlink_default

alphas: [1.0]

slurm:
  partition: ice-gpu
  qos: coc-ice
  time: 04:00:00
  cpus_per_task: 8
  gpus_per_node: 4
  gpu_type: h200
  use_gres: true
  mem: 64G
  modules: [gcc/12.3.0, python/3.11, cuda/13.0.1]
  workdir: /home/hice1/sghose7/moe-breakdown
  uv_env_dir: /storage/ice1/0/2/sghose7/moe-breakdown-deepep-venv
  deepep_wheel: /storage/ice1/0/2/sghose7/deepep-build/workspace/dist/deep_ep-2.0.0+d4f41e4-cp311-cp311-linux_x86_64.whl
  extra_sbatch_args:
    - "--exclude=atl1-1-03-013-3-0,atl1-1-03-013-8-0,atl1-1-03-013-13-0,atl1-1-03-012-18-0,atl1-1-03-012-23-0"
