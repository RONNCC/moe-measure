# expt-3-deeptest: DeepEP High Throughput — Multi-Node (Study G)
#
# Scales DeepEP HT from single-node (ep8) to 2-node (ep16) on PACE ICE H200.
# This is the critical study for the "network matters across nodes" claim:
# at single-node, GPUs communicate via NVLink/NVSwitch (fast). At multi-node,
# traffic crosses the IB fabric, exposing the full inter-node bandwidth bottleneck.
#
# DeepEP topology constraint: LEGACY_NUM_MAX_NVL_PEERS=8 hardcodes NVLink domains.
# Each physical node MUST contribute exactly 8 GPUs (full HGX node) so each node maps
# to one rdma_rank domain. Minimum multi-node config: ep=16 on 2 nodes × 8 GPUs/node.
# PACE ICE H200 nodes have 8x H200 SXM5 (confirmed via sinfo: gpu:h200:8(S:0-3)).
#
# Research questions:
#   Does DeepEP HT scale well from 1→2 nodes? Is latency dominated by IB
#   bandwidth at large token counts? Does routing imbalance become more severe
#   at multi-node due to uneven IB traffic?
#
# Parallel points:
#   tp1-ep1 : 1 GPU total — single-GPU control (no dispatch)
#   tp1-ep8 : 8 GPUs, 1 full node — intra-node NVLink (rdma_rank=0 for all ranks)
#   tp1-ep16: 16 GPUs, 2 nodes × 8 GPUs — first IB hop (rdma_rank 0 vs 1)
#
# SLURM resources:
#   tp1-ep1  : 1 node, 1 GPU
#   tp1-ep8  : 1 node, 8 GPUs (full node)
#   tp1-ep16 : 2 nodes, 8 GPUs/node
#
# SLURM jobs: 3 parallel points × 1 transport = 3
# Conditions per job: 1 shape × 1 routing × 14 tokens = 14
# Grand total: 42 benchmark conditions

study_name: deepep-ht-multinode-qwen3
all2all_backend: deepep_high_throughput
output_root: ~/scratch/moe-breakdown-runs/expt-3-deeptest

hot_expert_count: 1
routing_weight_mode: uniform
apply_router_weight_on_input: false
seed: 42
warmup_iters: 30
measure_iters: 100
collect_buckets: true
bucket_profile_iters: 5
bucket_full_events: true

sweep_modes:
  - full_factorial

baseline:
  alpha: 1.0
  tokens: 512
  parallel:
    tp: 1
    ep: 1

kernel_shapes:
  - name: qwen3_30b_a3b_moe
    hidden_size: 2048
    intermediate_size: 768
    num_experts: 128
    topk: 8
    dtype: bfloat16

routing_modes:
  - uniform

tokens: [1, 2, 4, 8, 16, 32, 64, 128, 512, 2048, 8192, 16384, 32768, 65536]

parallel_points:
  - {tp: 1, ep: 1}    # 1 GPU, 1 node — pure compute baseline (no dispatch)
  - {tp: 1, ep: 8}    # 8 GPUs, 1 full node — NVLink only (rdma_rank=0 for all)
  - {tp: 1, ep: 16}   # 16 GPUs, 2 nodes × 8 GPUs — first IB hop (rdma_rank 0 vs 1)

transport_conditions:
  - nvlink_default

alphas: [1.0]

slurm:
  partition: ice-gpu
  qos: coc-ice
  time: 04:00:00
  cpus_per_task: 8
  gpus_per_node: 8
  gpu_type: h200
  use_gres: true
  mem: 128G
  # No min_nodes needed: ep=16 naturally requires ceil(16/8)=2 nodes.
  # ep=8 fits on 1 full node (8/8=1). ep=1 also 1 node. No forcing needed.
  min_nodes: 1
  modules: [gcc/12.3.0, python/3.11, cuda/13.0.1]
  workdir: /home/hice1/sghose7/moe-breakdown
  uv_env_dir: /storage/ice1/0/2/sghose7/moe-breakdown-deepep-venv
  deepep_wheel: /storage/ice1/0/2/sghose7/deepep-build/workspace/dist/deep_ep-2.0.0+d4f41e4-cp311-cp311-linux_x86_64.whl
  extra_sbatch_args:
    - "--exclude=atl1-1-03-013-3-0,atl1-1-03-013-8-0,atl1-1-03-013-13-0,atl1-1-03-012-18-0,atl1-1-03-012-23-0"
