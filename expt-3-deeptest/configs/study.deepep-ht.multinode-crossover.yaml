# expt-3-deeptest: DeepEP High Throughput — Multi-Node Transport Crossover (Study H)
#
# Tests the same EP degrees under different IB transport conditions.
# Key comparison: ep=8 (single full node, NVLink only) vs ep=16 (2 nodes × 8 GPUs,
# IB required). With no_ib, ep=16 falls back to TCP — showing the full cost of losing IB.
#
# DeepEP topology constraint: gpus_per_node=8 required for multi-node.
# ep=8: all ranks on 1 node (rdma_rank=0) → pure NVLink, no IB
# ep=16: ranks 0-7 on node 0 (rdma_rank=0), ranks 8-15 on node 1 (rdma_rank=1) → IB
#
# Research questions:
#   How much does the IB hop cost vs NVLink for the same token count?
#   Does routing imbalance hurt more when dispatch crosses IB?
#   What is the TCP fallback cost when IB is unavailable (no_ib)?
#
# Compare to single-node (Studies B/D/E):
#   B/D/E tp1-ep8  : 8 GPUs same node → NVLink only
#   H     tp1-ep8  : also 1 node, 8 GPUs → same path (control: no transport effect)
#   H     tp1-ep16 : 2 nodes × 8 GPUs → IB for cross-node dispatch
#
# SLURM jobs: 3 parallel points × 3 transports = 9
# Conditions per job: 4 routing_modes × 14 tokens = 56
# Grand total: 504 benchmark conditions

study_name: deepep-ht-multinode-crossover-qwen3
all2all_backend: deepep_high_throughput
output_root: ~/scratch/moe-breakdown-runs/expt-3-deeptest

hot_expert_count: 1
routing_weight_mode: uniform
apply_router_weight_on_input: false
seed: 42
warmup_iters: 30
measure_iters: 100
collect_buckets: true
bucket_profile_iters: 5
bucket_full_events: true

sweep_modes:
  - full_factorial

baseline:
  alpha: 1.0
  tokens: 512
  parallel:
    tp: 1
    ep: 1

kernel_shapes:
  - name: qwen3_30b_a3b_moe
    hidden_size: 2048
    intermediate_size: 768
    num_experts: 128
    topk: 8
    dtype: bfloat16

routing_modes:
  - uniform
  - zipfian
  - skewed-2x
  - skewed-4x

tokens: [1, 2, 4, 8, 16, 32, 64, 128, 512, 2048, 8192, 16384, 32768, 65536]

parallel_points:
  - {tp: 1, ep: 1}   # 1 GPU, 1 node — compute baseline, no dispatch
  - {tp: 1, ep: 8}   # 8 GPUs, 1 full node — NVLink only (single rdma_rank domain)
  - {tp: 1, ep: 16}  # 2 nodes × 8 GPUs — IB for cross-node dispatch (rdma_rank 0 vs 1)

# nvlink_default on multi-node = IB at full speed (NCCL auto-selects IB).
# no_ib = TCP fallback, simulating degraded/congested inter-node fabric.
# no_ib_4ch = TCP with channel limit, bandwidth floor.
# On ep=8 (single node), no_ib and no_ib_4ch have no effect — control confirms this.
transport_conditions:
  - nvlink_default
  - no_ib
  - no_ib_4ch

alphas: [1.0]

slurm:
  partition: ice-gpu
  qos: coc-ice
  time: 06:00:00
  cpus_per_task: 8
  gpus_per_node: 8
  gpu_type: h200
  use_gres: true
  mem: 128G
  # No min_nodes needed: ep=16 → ceil(16/8)=2 nodes naturally. ep=8 → 1 node.
  min_nodes: 1
  modules: [gcc/12.3.0, python/3.11, cuda/13.0.1]
  workdir: /home/hice1/sghose7/moe-breakdown
  uv_env_dir: /storage/ice1/0/2/sghose7/moe-breakdown-deepep-venv
  deepep_wheel: /storage/ice1/0/2/sghose7/deepep-build/workspace/dist/deep_ep-2.0.0+d4f41e4-cp311-cp311-linux_x86_64.whl
  extra_sbatch_args:
    - "--exclude=atl1-1-03-013-3-0,atl1-1-03-013-8-0,atl1-1-03-013-13-0,atl1-1-03-012-18-0,atl1-1-03-012-23-0"
