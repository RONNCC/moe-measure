# expt-3-deeptest: DeepEP Low Latency — Routing Sweep (Study C)
#
# Extends study.deepep-ll.qwen3.yaml with a 4-mode routing sweep to measure how
# expert load imbalance interacts with the NVSHMEM one-sided dispatch mechanism.
#
# Research question:
#   Does routing skew increase DeepEP LL latency? At decode scale (small tokens),
#   LL dispatch queues are sized per-expert — imbalance means some experts overflow
#   their queue depth while others sit idle. Does this show up as worse tail latency?
#
# Routing modes:
#   uniform    : equal probability across all 128 experts (baseline, matched to studies A/B)
#   zipfian    : power-law distribution (expert 0 gets ~40% of traffic, long tail)
#   skewed-2x  : hot expert receives 2× expected token share (mild imbalance, alpha=2.0)
#   skewed-4x  : hot expert receives 4× expected token share (heavy imbalance, alpha=4.0)
#
#   worst-case omitted: all tokens → topk=8 experts → likely buffer overflow at ep>1
#   random omitted: non-reproducible Dirichlet; useful for stress but not for comparison
#
# Token cap: 8192 (same as Study A). DeepEP LL buffer INT overflow at max_tokens>=16384.
# Parallel points: tp1-ep1, tp1-ep2, tp1-ep4 (tp>1 unsupported in this vLLM DeepEP LL path).
# Transport: nvlink_default only — NVSHMEM NVLink P2P; NCCL env vars do not affect LL dispatch.
#
# SLURM jobs: 3 parallel points × 1 transport = 3
# Conditions per job: 4 routing_modes × 11 tokens = 44
# Grand total: 132 benchmark conditions

study_name: deepep-ll-routing-qwen3
all2all_backend: deepep_low_latency
output_root: ~/scratch/moe-breakdown-runs/expt-3-deeptest

hot_expert_count: 1
routing_weight_mode: uniform
apply_router_weight_on_input: false
seed: 42
warmup_iters: 30
measure_iters: 100
collect_buckets: true
bucket_profile_iters: 5
bucket_full_events: true

sweep_modes:
  - full_factorial

baseline:
  alpha: 1.0
  tokens: 512
  parallel:
    tp: 1
    ep: 1

kernel_shapes:
  - name: qwen3_30b_a3b_moe
    hidden_size: 2048
    intermediate_size: 768
    num_experts: 128
    topk: 8
    dtype: bfloat16

routing_modes:
  - uniform
  - zipfian
  - skewed-2x
  - skewed-4x

# Hard cap at 8192: DeepEP LL buffer INT assertion at max_tokens >= 16384 (hidden=2048, E=128).
tokens: [1, 2, 4, 8, 16, 32, 64, 128, 512, 2048, 8192]

parallel_points:
  - {tp: 1, ep: 1}   # control: no inter-GPU dispatch
  - {tp: 1, ep: 2}   # onset of expert dispatch
  - {tp: 1, ep: 4}   # maximum EP on 4-GPU node
  # tp2-ep2 omitted: vLLM DeepEP LL does not support tp>1 (modular_kernel.py:807 assertion)

# LL uses NVSHMEM for expert dispatch — NCCL transport conditions do not apply.
# NCCL env vars would only affect TP allreduce collectives, which don't exist at tp=1.
transport_conditions:
  - nvlink_default

alphas: [1.0]

slurm:
  partition: ice-gpu
  qos: coc-ice
  time: 03:00:00
  cpus_per_task: 8
  gpus_per_node: 4
  gpu_type: h200
  use_gres: true
  mem: 64G
  modules: [gcc/12.3.0, python/3.11, cuda/13.0.1]
  workdir: /home/hice1/sghose7/moe-breakdown
  uv_env_dir: /storage/ice1/0/2/sghose7/moe-breakdown-deepep-venv
  deepep_wheel: /storage/ice1/0/2/sghose7/deepep-build/workspace/dist/deep_ep-2.0.0+d4f41e4-cp311-cp311-linux_x86_64.whl
  extra_sbatch_args:
    - "--exclude=atl1-1-03-013-3-0,atl1-1-03-013-8-0,atl1-1-03-013-13-0,atl1-1-03-012-18-0,atl1-1-03-012-23-0"
