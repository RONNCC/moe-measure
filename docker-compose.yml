version: "3.8"

# Quick-start profiles for popular MoE models.  Pick one with:
#   docker compose run --rm mixtral-8x7b
#   docker compose run --rm qwen-moe
#   docker compose run --rm deepseek-moe
#   docker compose run --rm demo      # synthetic, no GPU

x-moe-base: &moe-base
  image: moe-breakdown
  build: .
  volumes:
    - ./runs:/runs
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  demo:
    <<: *moe-base
    command: ["--backend", "synthetic", "--title", "synthetic MoE demo", "--out", "/runs/demo"]

  mixtral-8x7b:
    <<: *moe-base
    command:
      - "--backend"
      - "transformers"
      - "--model"
      - "mistralai/Mixtral-8x7B-Instruct-v0.1"
      - "--tokens"
      - "32"
      - "--passes"
      - "2"
      - "--out"
      - "/runs/mixtral-8x7b"

  qwen-moe:
    <<: *moe-base
    command:
      - "--backend"
      - "transformers"
      - "--model"
      - "Qwen/Qwen1.5-MoE-A2.7B"
      - "--tokens"
      - "32"
      - "--passes"
      - "2"
      - "--out"
      - "/runs/qwen-moe"

  deepseek-moe:
    <<: *moe-base
    command:
      - "--backend"
      - "transformers"
      - "--model"
      - "deepseek-ai/deepseek-moe-16b-base"
      - "--tokens"
      - "32"
      - "--passes"
      - "2"
      - "--out"
      - "/runs/deepseek-moe"

  qwen3-moe-tiny:
    <<: *moe-base
    command:
      - "--backend"
      - "transformers"
      - "--model"
      - "PrimeIntellect/qwen3-moe-tiny"
      - "--tokens"
      - "32"
      - "--passes"
      - "3"
      - "--out"
      - "/runs/qwen3-moe-tiny"

  vllm-client:
    <<: *moe-base
    network_mode: host
    command:
      - "--backend"
      - "vllm"
      - "--model"
      - "mistralai/Mixtral-8x7B-Instruct-v0.1"
      - "--base-url"
      - "http://localhost:8000"
      - "--passes"
      - "10"
      - "--out"
      - "/runs/vllm_mixtral"
