study_name: qwen3-30b-a3b-full-twonode
all2all_backend: allgather_reducescatter
output_root: ~/scratch/moe-breakdown-runs

# Full two-node characterization: parallel configs that span 2 H100 nodes.
# Run this AFTER full-onenode succeeds — the IB all-to-all makes multi-node
# more likely to hit infra issues (NCCL, IB fabric, node placement).
#
# Both configs use 16 GPUs across 2 nodes; the EP=16 variant isolates pure
# all-to-all overhead while tp2-ep8 adds intra-node TP reduction on top.

hot_expert_count: 1
routing_weight_mode: uniform
apply_router_weight_on_input: false
seed: 42
warmup_iters: 20
measure_iters: 100
collect_buckets: true
bucket_profile_iters: 5
bucket_full_events: true
zipf_s: 1.0

sweep_modes:
  - one_at_a_time
  - full_factorial

baseline:
  alpha: 1.0
  tokens: 512
  parallel:
    tp: 1
    ep: 16

kernel_shapes:
  - name: qwen3_30b_a3b_moe
    hidden_size: 2048
    intermediate_size: 768
    num_experts: 128
    topk: 8
    dtype: bfloat16

routing_modes:
  - uniform
  - zipfian
  - random
  - skewed-2x
  - skewed-4x
  - worst-case

tokens: [1, 4, 16, 64, 256, 1024, 4096, 16384, 65536, 131072, 200000]

# 2-node jobs — inter-node InfiniBand all-to-all.
# Qwen3 128 experts / ep16 = 8 experts/rank.
parallel_points:
  - {tp: 1, ep: 16}  # pure EP   — 16 GPUs, 2 nodes, all-to-all over IB
  - {tp: 2, ep: 8}   # TP+EP     — 16 GPUs, 2 nodes, IB all-to-all + NVLink reduce

slurm:
  partition: ice-gpu
  qos: coc-ice
  time: 04:00:00
  cpus_per_task: 8
  gpus_per_node: 8
  gpu_type: h100
  use_gres: true
  mem: 96G
  modules: [gcc/12.3.0, python/3.11, cuda/12.1.1]
  workdir: /home/hice1/sghose7/moe-breakdown
  uv_env_dir: ~/scratch/moe-breakdown-venv
  extra_sbatch_args: []
