study_name: qwen3-30b-a3b-full-onenode-limited
all2all_backend: allgather_reducescatter
output_root: ~/scratch/moe-breakdown-runs

# Full single-node study restricted to ≤4 GPUs per node.
# Skips the 8-GPU configs (ep8, tp2-ep4, tp4-ep2) which require a fully
# healthy 8-GPU node — submit those via full-onenode once nodes are fixed.
#
# 5 parallel points × 83 conditions = 415 conditions total.

hot_expert_count: 1
routing_weight_mode: uniform
apply_router_weight_on_input: false
seed: 42
warmup_iters: 20
measure_iters: 100
collect_buckets: true
bucket_profile_iters: 5
bucket_full_events: true
zipf_s: 1.0

sweep_modes:
  - one_at_a_time
  - full_factorial

baseline:
  alpha: 1.0
  tokens: 512
  parallel:
    tp: 1
    ep: 1

kernel_shapes:
  - name: qwen3_30b_a3b_moe
    hidden_size: 2048
    intermediate_size: 768
    num_experts: 128
    topk: 8
    dtype: bfloat16

routing_modes:
  - uniform
  - zipfian
  - random
  - skewed-2x
  - skewed-4x
  - worst-case

tokens: [1, 4, 16, 64, 256, 1024, 4096, 16384, 65536, 131072, 200000]

parallel_points:
  - {tp: 1, ep: 1}   # baseline  — 1 GPU
  - {tp: 2, ep: 1}   # TP-only   — 2 GPUs
  - {tp: 1, ep: 2}   # EP-only   — 2 GPUs
  - {tp: 1, ep: 4}   # EP=4      — 4 GPUs
  - {tp: 2, ep: 2}   # TP+EP     — 4 GPUs

slurm:
  partition: ice-gpu
  qos: coc-ice
  time: 04:00:00
  cpus_per_task: 8
  gpus_per_node: 8
  gpu_type: h100
  use_gres: true
  mem: 96G
  modules: [gcc/12.3.0, python/3.11, cuda/12.1.1]
  uv_env_dir: /storage/ice1/0/2/sghose7/moe-breakdown-venv
