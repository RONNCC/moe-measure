study_name: qwen3-30b-a3b-medium
all2all_backend: allgather_reducescatter
output_root: ~/scratch/moe-breakdown-runs

# Medium study: enough to make meaningful graphs without burning a lot of
# compute time. Covers the full routing-mode spectrum and a representative
# token sweep, at just ep1 (baseline) and ep4 (inter-node overhead).
#
# Full study is ~415 conditions × 5 jobs × 4 h.
# This study is 60 conditions × 2 jobs × ~45 min.
#
# When to upgrade to the full study:
#   - When you want tp2 / tp+ep mixed configs
#   - When you want the 32K–200K long-context token regime
#   - When you want one_at_a_time sweep isolation plots

hot_expert_count: 1
routing_weight_mode: uniform
apply_router_weight_on_input: false
seed: 42
warmup_iters: 10
measure_iters: 30
collect_buckets: true
bucket_profile_iters: 3
bucket_full_events: false

zipf_s: 1.0

sweep_modes:
  - full_factorial

baseline:
  alpha: 1.0
  tokens: 1024
  parallel:
    tp: 1
    ep: 1

kernel_shapes:
  - name: qwen3_30b_a3b_moe
    hidden_size: 2048
    intermediate_size: 768
    num_experts: 128
    topk: 8
    dtype: bfloat16

routing_modes:
  - uniform       # balanced — lower bound
  - zipfian       # power-law s=1 — most realistic
  - random        # Dirichlet(1) — mild natural imbalance
  - skewed-2x     # moderate imbalance
  - skewed-4x     # aggressive imbalance
  - worst-case    # absolute upper bound

# 5 log-spaced values spanning decode → short prefill.
# At EP=1, A100 compute-bound crossover predicted near 1248 tokens.
tokens: [64, 256, 1024, 4096, 16384]

parallel_points:
  - {tp: 1, ep: 1}   # baseline — 1 GPU
  - {tp: 1, ep: 4}   # EP=4 — 4 GPUs, intra-node NVLink
  - {tp: 1, ep: 8}   # EP=8 — 8 GPUs, full node NVLink

slurm:
  partition: ice-gpu
  qos: coc-ice
  time: 01:30:00
  cpus_per_task: 8
  gpus_per_node: 8
  gpu_type: h100
  use_gres: true
  mem: 96G
  modules: [gcc/12.3.0, python/3.11, cuda/12.1.1]
  workdir: /home/hice1/sghose7/moe-breakdown
  uv_env_dir: ~/scratch/moe-breakdown-venv
  extra_sbatch_args: []
