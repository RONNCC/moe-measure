# PrimeIntellect/qwen3-moe-tiny -- 670M params, 16 experts (top-4).
# Small enough to run on a single GPU; useful smoke-test target.
# https://huggingface.co/PrimeIntellect/qwen3-moe-tiny
model: PrimeIntellect/qwen3-moe-tiny

# These are used by the synthetic backend for projection demos
synthetic:
  num_experts: 16
  top_k: 4
  hidden: 1024
  ffn_hidden: 256        # moe_intermediate_size
  tokens: 512
