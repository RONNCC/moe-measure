study_name: routing-modes-deepep-h100
all2all_backend: deepep_low_latency
output_root: runs

hot_expert_count: 1
routing_weight_mode: uniform
apply_router_weight_on_input: false
seed: 0
warmup_iters: 20
measure_iters: 100
collect_buckets: true
bucket_profile_iters: 5
bucket_full_events: true

sweep_modes:
  - full_factorial

baseline:
  alpha: 1.0
  tokens: 512
  parallel:
    tp: 1
    ep: 1

kernel_shapes:
  - name: mixtral_like
    hidden_size: 4096
    intermediate_size: 14336
    num_experts: 8
    topk: 2
    dtype: bfloat16
  - name: deepseek_like
    hidden_size: 7168
    intermediate_size: 18432
    num_experts: 16
    topk: 2
    dtype: bfloat16

routing_modes: [uniform, zipfian, random, skewed-2x, skewed-4x, worst-case]
alphas: [1.0]
tokens: [64, 256, 512, 1024, 2048, 4096, 8192, 12288, 16384, 20480, 32768, 65536]

parallel_points:
  - {tp: 1, ep: 1}
  # tp1-ep4 and higher EP blocked by NVSHMEM IBRC on PACE ICE

slurm:
  qos: coc-ice
  time: 04:00:00
  cpus_per_task: 8
  gpus_per_node: 8
  gpu_type: h100
  use_gres: true
  mem: 128G
  modules: [gcc/12.3.0, python/3.11, cuda/13.0.1]
  workdir: /home/hice1/sghose7/moe-breakdown
  deepep_wheel: /storage/ice1/0/2/sghose7/deepep-build/workspace/dist/deep_ep-*.whl
  extra_sbatch_args: []
