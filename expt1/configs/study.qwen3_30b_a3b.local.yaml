study_name: qwen3-30b-a3b-initial
all2all_backend: allgather_reducescatter
output_root: ~/scratch/moe-breakdown-runs

# Qwen/Qwen3-30B-A3B MoE shape:
# hidden_size=2048, moe_intermediate_size=768, num_experts=128,
# num_experts_per_tok=8, dtype=bfloat16.
hot_expert_count: 1
routing_weight_mode: uniform
apply_router_weight_on_input: false
seed: 0
warmup_iters: 10
measure_iters: 50
collect_buckets: true
bucket_profile_iters: 3
bucket_full_events: true

sweep_modes:
  - one_at_a_time
  - full_factorial

baseline:
  alpha: 1.0
  tokens: 512
  parallel:
    tp: 1
    ep: 1

kernel_shapes:
  - name: qwen3_30b_a3b_moe
    hidden_size: 2048
    intermediate_size: 768
    num_experts: 128
    topk: 8
    dtype: bfloat16

alphas: [1.0, 4.0]
tokens: [128, 512, 1024]

parallel_points:
  - {tp: 1, ep: 1}
  - {tp: 1, ep: 4}

slurm:
  partition: ice-gpu
  qos: coc-ice
  time: 01:30:00
  cpus_per_task: 8
  gpus_per_node: 8
  gpu_type: h100
  use_gres: true
  mem: 96G
  modules: [gcc/12.3.0, python/3.11, cuda/12.1.1]
  workdir: /home/hice1/sghose7/moe-breakdown
  uv_env_dir: ~/scratch/moe-breakdown-venv
  extra_sbatch_args: []
