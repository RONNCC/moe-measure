study_name: fused-moe-characterization-pace-h100-deepep
all2all_backend: deepep_low_latency
output_root: runs

hot_expert_count: 1
routing_weight_mode: uniform
apply_router_weight_on_input: false
seed: 0
warmup_iters: 20
measure_iters: 100
collect_buckets: true
bucket_profile_iters: 5
bucket_full_events: true

sweep_modes:
  - one_at_a_time
  - full_factorial

baseline:
  alpha: 1.0
  tokens: 512
  parallel:
    tp: 1
    ep: 1

kernel_shapes:
  - name: mixtral_like
    hidden_size: 4096
    intermediate_size: 14336
    num_experts: 8
    topk: 2
    dtype: bfloat16
  - name: deepseek_like
    hidden_size: 7168
    intermediate_size: 18432
    num_experts: 16
    topk: 2
    dtype: bfloat16

alphas: [1.0, 2.0, 4.0, 8.0]
tokens: [128, 256, 512, 1024, 2048, 4096]

parallel_points:
  - {tp: 1, ep: 1}
  - {tp: 1, ep: 2}
  - {tp: 2, ep: 2}
  - {tp: 1, ep: 4}

slurm:
  qos: coc-ice
  time: 02:00:00
  cpus_per_task: 8
  gpus_per_node: 8
  gpu_type: h100
  use_gres: true
  mem: 128G
  # cuda/13.0.1 required: H100 is sm_90, DeepEP JIT targets the active GPU at runtime.
  modules: [gcc/12.3.0, python/3.11, cuda/13.0.1]
  workdir: /home/hice1/sghose7/moe-breakdown
  uv_env_dir: $TMPDIR/moe-breakdown-venv
  # Path to the pre-built DeepEP wheel (built by slurm/build_deepep.sbatch).
  # bootstrap_uv_env.sh installs this + nvidia-nccl-cu13>=2.30.4 into each job's venv.
  deepep_wheel: /storage/ice1/0/2/sghose7/deepep-build/workspace/dist/deep_ep-*.whl
  extra_sbatch_args: []
